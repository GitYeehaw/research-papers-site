name: Scrape Papers & Deploy

on:
  # Run every morning at 8:00 AM UTC
  schedule:
    - cron: '0 8 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Also run on pushes to main (for initial deploy & code changes)
  push:
    branches: [main]

# Sets permissions of the GITHUB_TOKEN for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run arXiv scraper
        run: python scripts/scrape.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "chore: update paper data $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

  build-and-deploy:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull the latest commit (including any data updates from scrape job)
          ref: main

      - name: Pull latest changes
        run: git pull origin main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          # Keeps previous deployments around
          keep_files: false
